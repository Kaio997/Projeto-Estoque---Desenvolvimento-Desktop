<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Premium System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="form-container">
        <div class="logo-container">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L3.5 7V17L12 22L20.5 17V7L12 2Z" stroke="url(#emeraldGradient)" stroke-width="2" stroke-linejoin="round"/>
                <path d="M12 6L7 9V15L12 18L17 15V9L12 6Z" fill="url(#emeraldGradient)"/>
                <defs>
                    <linearGradient id="emeraldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#10b981" />
                        <stop offset="100%" stop-color="#059669" />
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <h2 id="welcomeMsg">Bem-vindo!</h2>
        <p>Você acessou o painel de controle premium.</p>
                
        <button id="estoqueBtn" style="margin-bottom: 10px; background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: white; animation: none;">Gerenciar Estoque</button>
        <button id="logoutBtn">Sair do Sistema</button>
    </div>

    <script src="script.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (user) {
            document.getElementById('welcomeMsg').textContent = `Olá, ${user.nome}!`;
        } else {
            window.location.href = 'index.html';
        }

        document.getElementById('estoqueBtn').addEventListener('click', () => {
            window.location.href = 'estoque.html';
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('usuarioLogado');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
